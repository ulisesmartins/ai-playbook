site_name: Dialpad AI Playbook
site_description: Shared AI playbook for Dialpad — prompts, skills, agents, templates, and workflows for Product Managers and all Dialpad employees.
site_url: https://dialpad.github.io/ai-playbook/
repo_url: https://github.com/dialpad/ai-playbook
repo_name: dialpad/ai-playbook
docs_dir: .
edit_uri: edit/master/

extra_css:
  - stylesheets/extra.css?v=7

extra_javascript:
  - stylesheets/role-filter.js?v=7
  - javascripts/extra.js?v=7

theme:
  name: material
  custom_dir: overrides
  font:
    text: DM Sans
    code: JetBrains Mono
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.action.view
    - content.tooltips
  icon:
    logo: material/star-four-points
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search

markdown_extensions:
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details

exclude_docs: |
  .gitignore
  mkdocs.yml
  requirements-docs.txt
  .github/
  .claude/
  memory/
  **/*.sh
  **/*.json
  **/*.py
  scripts/
  overrides/
  **/.gitkeep

